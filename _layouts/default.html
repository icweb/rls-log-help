<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#5e2bce" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0d0d12" media="(prefers-color-scheme: dark)">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}">
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/icon.svg' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="{{ '/' | relative_url }}" class="brand" aria-label="RLS Log home">
        <span class="brand-mark" aria-hidden="true">★</span>
        <span class="brand-text">{{ site.title }}</span>
        <span class="brand-sub">Help</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        {% for item in site.nav %}
          <a href="{{ item.url | relative_url }}"{% if page.url == item.url %} class="active" aria-current="page"{% endif %}>{{ item.title }}</a>
        {% endfor %}
      </nav>
    </div>
  </header>

  <main class="content" id="main">
    <div class="container">
      {% if page.title %}
        <header class="page-header">
          <h1>{{ page.title }}</h1>
          {% if page.subtitle %}<p class="subtitle">{{ page.subtitle }}</p>{% endif %}
        </header>
      {% endif %}
      <div class="prose">
        {{ content }}
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p class="footer-credit">
        Made with <span class="footer-heart" aria-hidden="true">♥</span> in Pittsburgh, PA.
      </p>
      <nav aria-label="Footer">
        <a href="{{ '/' | relative_url }}">Help</a>
        <a href="{{ '/faq.html' | relative_url }}">FAQ</a>
        <a href="{{ '/contact.html' | relative_url }}">Contact</a>
        <a href="{{ '/privacy.html' | relative_url }}">Privacy</a>
        <a href="{{ '/terms.html' | relative_url }}">Terms</a>
      </nav>
    </div>
  </footer>
</body>
</html>
